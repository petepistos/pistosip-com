<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 720" role="img" aria-labelledby="aegis-title aegis-desc"
     font-family="'Cormorant Garamond', Garamond, Georgia, serif">
  <title id="aegis-title">Pistos product architecture</title>
  <desc id="aegis-desc">Aegis vCISO services umbrella over three pillars: Mathisi (Security and Awareness), Sentinel (Compliance Core), and Skopein (Vulnerability Management). Together they form the Sentinel Bundle for organizations under 500 employees across insurance, defense, and healthcare.</desc>

  <style>
    .umbrella-name { font-size: 56px; font-weight: 500; fill: #152440; }
    .umbrella-greek { font-size: 22px; font-style: italic; fill: #3A4760; font-family: 'Cormorant Garamond', Georgia, serif; }
    .eyebrow-sm { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 5px; fill: #B8895A; }
    .eyebrow-xs { font-family: 'Inter', system-ui, sans-serif; font-size: 10.5px; font-weight: 500; letter-spacing: 1.6px; fill: #B8895A; }
    .pillar-name { font-size: 28px; font-weight: 500; fill: #152440; }
    .pillar-greek { font-size: 14px; font-style: italic; fill: #3A4760; font-family: 'Cormorant Garamond', Georgia, serif; }
    .module { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #3A4760; }
    .bundle { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 6px; fill: #152440; }
    .sectors { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 4px; fill: #3A4760; }
    .diamond { font-size: 14px; fill: #B8895A; font-family: Georgia, serif; }
    .diamond-sm { font-size: 12px; fill: #B8895A; font-family: Georgia, serif; }
    .rule-thin { stroke: #C9BEA7; stroke-width: 0.5; }
    .rule-med { stroke: #C9BEA7; stroke-width: 0.6; }
    .rule-gold { stroke: #B8895A; stroke-width: 0.6; }
    a .pillar-name { transition: fill 120ms ease; }
    a:hover .pillar-name { fill: #B8895A; }
    a { cursor: pointer; }
  </style>

  <rect width="800" height="720" fill="#EFE9DB"/>

  <text x="400" y="95" text-anchor="middle" class="umbrella-name">Aegis</text>
  <text x="400" y="126" text-anchor="middle" class="umbrella-greek">αἰγίς</text>
  <text x="400" y="156" text-anchor="middle" class="eyebrow-sm">V C I S O &#160; &#160;S E R V I C E S</text>

  <line x1="280" y1="180" x2="388" y2="180" class="rule-gold"/>
  <text x="400" y="185" text-anchor="middle" class="diamond">◆</text>
  <line x1="412" y1="180" x2="520" y2="180" class="rule-gold"/>

  <a xlink:href="pages/mathisi.html" href="pages/mathisi.html" target="_top" aria-label="Mathisi pillar detail">
    <text x="140" y="225" text-anchor="middle" class="pillar-name">Mathisi</text>
    <text x="140" y="248" text-anchor="middle" class="pillar-greek">Μάθηση</text>
    <text x="140" y="272" text-anchor="middle" class="eyebrow-xs">SECURITY &#160;AWARENESS</text>
  </a>
  <a xlink:href="pages/sentinel.html" href="pages/sentinel.html" target="_top" aria-label="Sentinel pillar detail">
    <text x="400" y="225" text-anchor="middle" class="pillar-name">Sentinel</text>
    <text x="400" y="248" text-anchor="middle" class="pillar-greek">sen · ti · nel</text>
    <text x="400" y="272" text-anchor="middle" class="eyebrow-xs">COMPLIANCE &#160;CORE</text>
  </a>
  <a xlink:href="pages/skopein.html" href="pages/skopein.html" target="_top" aria-label="Skopein pillar detail">
    <text x="660" y="225" text-anchor="middle" class="pillar-name">Skopein</text>
    <text x="660" y="248" text-anchor="middle" class="pillar-greek">σκοπεῖν</text>
    <text x="660" y="272" text-anchor="middle" class="eyebrow-xs">VULNERABILITY &#160;MANAGEMENT</text>
  </a>

  <text x="270" y="240" text-anchor="middle" class="diamond-sm">◆</text>
  <text x="530" y="240" text-anchor="middle" class="diamond-sm">◆</text>

  <line x1="90" y1="295" x2="190" y2="295" class="rule-med"/>
  <line x1="350" y1="295" x2="450" y2="295" class="rule-med"/>
  <line x1="610" y1="295" x2="710" y2="295" class="rule-med"/>

  <g text-anchor="middle" class="module">
    <text x="140" y="325">Introduction to Cybersecurity</text>
    <text x="140" y="349">Intermediate</text>
    <text x="140" y="373">Advanced</text>
    <text x="140" y="397">Training &amp; Awareness</text>
    <text x="140" y="421">Phishing Simulations</text>
    <text x="140" y="445">Real Security Events</text>
  </g>

  <g text-anchor="middle" class="module">
    <text x="400" y="325">Risk Assessment</text>
    <text x="400" y="349">Incident Response</text>
    <text x="400" y="373">Disaster Recovery</text>
    <text x="400" y="397">Hardware &amp; Software Inventory</text>
    <text x="400" y="421">Security Policies</text>
    <text x="400" y="445">Technology Security Posture</text>
    <text x="400" y="469">Process Security Posture</text>
  </g>

  <g text-anchor="middle" class="module">
    <text x="660" y="325">Internal Vulnerability Scanning</text>
    <text x="660" y="349">Web Application Scanning</text>
    <text x="660" y="373">Threat Hunting</text>
    <text x="660" y="397">Perimeter Scanning</text>
    <text x="660" y="421">Event Log Parsing</text>
  </g>

  <line x1="80" y1="555" x2="720" y2="555" class="rule-med"/>
  <text x="400" y="583" text-anchor="middle" class="bundle">T H E &#160;&#160;S E N T I N E L &#160;&#160;B U N D L E</text>
  <line x1="80" y1="605" x2="720" y2="605" class="rule-med"/>

  <text x="400" y="660" text-anchor="middle" class="sectors">
    <tspan>I N S U R A N C E</tspan>
    <tspan dx="10" fill="#B8895A" font-family="Georgia, serif">◆</tspan>
    <tspan dx="10">D E F E N S E</tspan>
    <tspan dx="10" fill="#B8895A" font-family="Georgia, serif">◆</tspan>
    <tspan dx="10">H E A L T H C A R E</tspan>
  </text>
</svg>