<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">Pistos product architecture</title>
  <desc id="diagram-desc">Aegis vCISO services delivering the Sentinel bundle of Mathisi training, Sentinel compliance core, and Skopein scanner — for organizations under 500 employees across insurance, defense, and healthcare verticals.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&amp;family=EB+Garamond:ital,wght@0,400;0,500;1,400&amp;display=swap');
      .name { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; fill: #14263E; }
      .greek { font-family: 'EB Garamond', Georgia, serif; font-style: italic; fill: #14263E; opacity: 0.75; }
      .descriptor { font-family: 'EB Garamond', Georgia, serif; font-weight: 500; fill: #6E5018; letter-spacing: 0.18em; }
      .tagline { font-family: 'EB Garamond', Georgia, serif; font-weight: 500; fill: #6E5018; letter-spacing: 0.22em; }
      .bracket { stroke: #14263E; fill: none; stroke-width: 0.75; opacity: 0.5; }
      .gold-line { stroke: #6E5018; fill: none; stroke-width: 0.6; opacity: 0.7; }
    </style>
  </defs>

  <rect width="1000" height="460" fill="#E1DED2"/>

  <!-- ============================================================
       AEGIS — the dominant element at top, no enclosing shape
       ============================================================ -->
  <text class="name" x="500" y="115" text-anchor="middle" font-size="56">Aegis</text>
  <text class="greek" x="500" y="148" text-anchor="middle" font-size="22">αἰγίς</text>
  <text class="descriptor" x="500" y="174" text-anchor="middle" font-size="11">vCISO  SERVICES</text>

  <!-- Thin gold rule beneath Aegis, marking the visual transition into the bundle -->
  <line class="gold-line" x1="380" y1="210" x2="620" y2="210"/>

  <!-- ============================================================
       THE THREE PRODUCTS — in a row beneath Aegis
       ============================================================ -->
  <!-- Mathisi -->
  <a href="pages/mathisi.html" style="cursor:pointer;">
  <text class="name" x="320" y="270" text-anchor="middle" font-size="24">Mathisi</text>
  <text class="greek" x="320" y="293" text-anchor="middle" font-size="14">Μάθηση</text>
  <text class="descriptor" x="320" y="312" text-anchor="middle" font-size="8">SECURITY  AND  AWARENESS</text>
  </a>

  <!-- Sentinel — center -->
  <a href="pages/sentinel.html" style="cursor:pointer;">
  <text class="name" x="500" y="270" text-anchor="middle" font-size="24">Sentinel</text>
  <text class="greek" x="500" y="293" text-anchor="middle" font-size="14">sen · ti · nel</text>
  <text class="descriptor" x="500" y="312" text-anchor="middle" font-size="8">COMPLIANCE  CORE</text>
  </a>

  <!-- Skopein -->
  <a href="pages/skopein.html" style="cursor:pointer;">
  <text class="name" x="680" y="270" text-anchor="middle" font-size="24">Skopein</text>
  <text class="greek" x="680" y="293" text-anchor="middle" font-size="14">σκοπεῖν</text>
  <text class="descriptor" x="680" y="312" text-anchor="middle" font-size="8">VULNERABILITY  MANAGEMENT</text>
  </a>

  <!-- Diamond ornaments separating the three products -->
  <text x="410" y="278" text-anchor="middle" font-size="12" fill="#6E5018" opacity="0.85">◆</text>
  <text x="590" y="278" text-anchor="middle" font-size="12" fill="#6E5018" opacity="0.85">◆</text>

  <!-- ============================================================
       BRACKET — beneath the three products, marking them as bundle
       ============================================================ -->
  <path class="bracket" d="M 280 350 L 280 363 L 720 363 L 720 350"/>
  <text class="descriptor" x="500" y="386" text-anchor="middle" font-size="10">THE  SENTINEL  BUNDLE</text>

  <!-- ============================================================
       INDUSTRY TAGLINE — bottom
       ============================================================ -->
  <line class="gold-line" x1="280" y1="425" x2="720" y2="425"/>
  <text class="tagline" x="500" y="445" text-anchor="middle" font-size="11">INSURANCE   ◆   DEFENSE   ◆   HEALTHCARE</text>

</svg>
